# T-Pot: CUSTOM EDITION
# Generated on: 2026-04-29 15:39:40
networks:
  endlessh_local: null
  heralding_local: null
  log4pot_local: null
  sentrypeer_local: null
  nginx_local: null
  ewsposter_local: null
services:
  tpotinit:
    container_name: tpotinit
    env_file:
    - .env
    restart: always
    stop_grace_period: 60s
    tmpfs:
    - /tmp/etc:uid=2000,gid=2000
    - /tmp/:uid=2000,gid=2000
    network_mode: host
    cap_add:
    - NET_ADMIN
    image: ${TPOT_REPO}/tpotinit:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    volumes:
    - ${TPOT_DOCKER_COMPOSE}:/tmp/tpot/docker-compose.yml:ro
    - ${TPOT_DATA_PATH}/blackhole:/etc/blackhole
    - ${TPOT_DATA_PATH}:/data
    - /var/run/docker.sock:/var/run/docker.sock:ro
  logstash:
    container_name: logstash
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    environment:
     - LS_JAVA_OPTS=-Xms256m -Xmx256m
     - TPOT_TYPE=${TPOT_TYPE:-HIVE}
     - TPOT_HIVE_USER=${TPOT_HIVE_USER}
     - TPOT_HIVE_IP=${TPOT_HIVE_IP}
     - LS_SSL_VERIFICATION=${LS_SSL_VERIFICATION:-full}
    ports:
     - "127.0.0.1:64305:64305"
    mem_limit: 512m
    memswap_limit: 2g
    image: ghcr.io/sweetbaitadmin/bear_project:logstash-arm64-v2
    pull_policy: ${TPOT_PULL_POLICY}
    volumes:
     - ${TPOT_DATA_PATH}:/data
  endlessh:
    container_name: endlessh
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    networks:
    - endlessh_local
    ports:
    - 22:2222
    image: ${TPOT_REPO}/endlessh:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    read_only: true
    volumes:
    - ${TPOT_DATA_PATH}/endlessh/log:/var/log/endlessh
  heralding:
    container_name: heralding
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    tmpfs:
     - /tmp/heralding:uid=2000,gid=2000
    networks:
     - heralding_local
    ports:
     - "21:21"
    # - "22:22"
     - "23:23"
     - "25:25"
     - "80:80"
     - "110:110"
     - "143:143"
     - "443:443"
     - "465:465"
     - "993:993"
     - "995:995"
     - "3306:3306"
     - "3389:3389"
     - "1080:1080"
     - "5432:5432"
     - "5900:5900"
    image: ${TPOT_REPO}/heralding:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    read_only: true
    volumes:
     - ${TPOT_DATA_PATH}/heralding/log:/var/log/heralding
  honeytrap:
    container_name: honeytrap
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    tmpfs:
    - /tmp/honeytrap:uid=2000,gid=2000
    network_mode: host
    cap_add:
    - NET_ADMIN
    image: ${TPOT_REPO}/honeytrap:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    read_only: true
    volumes:
    - ${TPOT_DATA_PATH}/honeytrap/attacks:/opt/honeytrap/var/attacks
    - ${TPOT_DATA_PATH}/honeytrap/downloads:/opt/honeytrap/var/downloads
    - ${TPOT_DATA_PATH}/honeytrap/log:/opt/honeytrap/var/log
  log4pot:
    container_name: log4pot
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    tmpfs:
    - /tmp:uid=2000,gid=2000
    networks:
    - log4pot_local
    ports:
    # - 80:8080
    # - 443:8080
    - 8080:8080
    - 9200:8080
    - 25565:8080
    image: ${TPOT_REPO}/log4pot:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    read_only: true
    volumes:
    - ${TPOT_DATA_PATH}/log4pot/log:/var/log/log4pot/log
    - ${TPOT_DATA_PATH}/log4pot/payloads:/var/log/log4pot/payloads
  sentrypeer:
    container_name: sentrypeer
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    networks:
    - sentrypeer_local
    ports:
    - 5060:5060/tcp
    - 5060:5060/udp
    image: ${TPOT_REPO}/sentrypeer:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    read_only: true
    volumes:
    - ${TPOT_DATA_PATH}/sentrypeer/log:/var/log/sentrypeer
  p0f:
    container_name: p0f
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    network_mode: host
    image: ${TPOT_REPO}/p0f:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    read_only: true
    volumes:
    - ${TPOT_DATA_PATH}/p0f/log:/var/log/p0f
  ewsposter:
    container_name: ewsposter
    restart: always
    depends_on:
      tpotinit:
        condition: service_healthy
    networks:
    - ewsposter_local
    environment:
    - EWS_HPFEEDS_ENABLE=false
    - EWS_HPFEEDS_HOST=host
    - EWS_HPFEEDS_PORT=port
    - EWS_HPFEEDS_CHANNELS=channels
    - EWS_HPFEEDS_IDENT=user
    - EWS_HPFEEDS_SECRET=secret
    - EWS_HPFEEDS_TLSCERT=false
    - EWS_HPFEEDS_FORMAT=json
    image: ${TPOT_REPO}/ewsposter:${TPOT_VERSION}
    pull_policy: ${TPOT_PULL_POLICY}
    volumes:
    - ${TPOT_DATA_PATH}:/data
    - ${TPOT_DATA_PATH}/ews/conf/ews.ip:/opt/ewsposter/ews.ip
